<!DOCTYPE html>
<html>
<head>
  <title>Loan Approval Predictor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      color: white;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .form-control {
      background: #334155;
      color: white;
      border: none;
    }

    .form-control:focus {
      box-shadow: 0 0 10px #38bdf8;
    }

    .btn-custom {
      background: #facc15;
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-custom:hover {
      background: #eab308;
      transform: scale(1.05);
    }

    .approved {
      color: #22c55e;
      font-weight: bold;
    }

    .rejected {
      color: #ef4444;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container mt-5">
  <div class="card">

    <h2 class="text-center text-warning mb-4">Loan Approval Predictor</h2>

    <form action="/predict" method="post">

      <input type="number" name="income" class="form-control mb-3" placeholder="Applicant Income" required>

      <input type="number" name="loan_amount" class="form-control mb-3" placeholder="Loan Amount" required>

      <input type="number" name="credit_score" class="form-control mb-3" placeholder="Credit Score" required>

      <button class="btn btn-custom w-100">Predict</button>

    </form>

   <div class="text-center mt-4">
  {% if prediction_text == "Loan Approved ✅" %}
    <h3 class="approved">Approved 🎉</h3>

  {% elif prediction_text == "Loan Rejected ❌" %}
    <h3 class="rejected">Rejected ❌</h3>
  {% endif %}
</div>

  </div>
</div>

</body>
</html>
